body:
  text: 王隱晉地道記泉陵縣北部東五里有鼻墟象所封也河陽有窮谷蓋本有窮氏所遷也中水縣屬河間廣縣在東莞陽都屬琅琊蒯城屬北地厭次屬平原平州屬巴郡戚屬東海鄭州陽武縣有博浪沙東萊掖縣有過鄉北有過城是古之過國也並史記注王城去洛城四十里河南有蒯鄉在縣西南有蒯亭訾城在榖城縣之東坎埳聚在縣南汲有銅關咸山在安邑南楊縣有梁城去縣五十里叔嚮邑也鐵縣有堯城左傳文十三年詹嘉處瑕在猗氏縣東北晉武公曲沃徙襄陽伊水東北入雒桃林縣西長城是潼關也大華山在華陽縣西南霸陵布霸水西藍田有虎候山池陽有𡽱嶭山在北有鬼谷生三所氏漆水在美陽縣西陽翟去洛陽二百八十六里屬河南定陵縣高陵山汝水所出長社本長葛以社中樹暴長漢改名潁水出陽乾山汝陰有陶邱鄉詩所謂汝墳項縣有公路城袁術所築吳房縣有吳城新蔡縣故呂侯國梁孝王築城十三里小鼓唱節杵下而和之稱睢陽曲昭二十二年禦諸橫橫亭在睢陽縣南沛有許城左傳定八年鄭伐許豐縣去沛國二百六十州六百雒千二十五里隱二年入向城在龍亢縣東南昭八年大蒐於紅謂沛國紅縣苦縣城南三十里有平城五父衢在魚國城東薛本國夏車正奚仲所封冢在城南二十里山上桓十二年盟曲池臨淄縣西南門曰曲門其側有池元城縣南有瑣陽城元氏縣有石塞三公塞房子縣有礫塞中谷塞望都縣有馬安關自上曲陽縣北行四百二十五里恒多山阪名飛狐口蒲陰有陽安關陽城蒲陽山蒲水出也清河靈縣有鳴犢河中邱縣有石門塞燒梁關浚儀本大梁儀封人此縣也承匡城在襄邑縣西秦亭在范縣西北壽張有蚩尤祠狗城湖陸縣西有費亭城魏武帝初所封金鄉縣多山所治名金山山北有鑿石為冢深十餘丈隧長三十丈旁卻入為室三方云得白兔不葬更葬南口鑿而得金故曰金山故冢今在或云漢昌邑所作或云秦時成武縣有秺城蘭陵有次室亭故魯次室邑贛榆縣海中去岸百九十步有秦始皇碑長一丈八尺廣五尺厚八尺三寸一行十三字潮水至加其上三丈去則三尺見也射陽有博支湖平原有篤馬河臨濟本狄伐衛懿公者鄑城在都昌縣西安邱有渠邸城東安平有羗頭山飬睪在下密縣西幽州藪有萊山萊主祠東萊郡黃縣東二百三十里至海中連岑有土道秦始皇祭此山刻二碑東二百三十里有始皇漢武帝二碑惤縣有口校萊君祠臨朐縣有石高山邾縣楚滅邾徙其君此城緜竹縣有柴炭山緜水之所出焉梓潼縣五婦山馳水所出建安二十二年劉備以為郡牂柯郡故且蘭有沈水鄨縣不狼山鄨水所出句町縣文眾水麇水西受徼外東至麇泠入尚龍谿鹽池澤在姑復縣南勝休縣有大河水東至毋撮入橋水賁古南島出錫毋掇縣有橋水出橋山同瀨縣銅虜山米水所出梇棟縣連山無血水所出弔鳥山有澤在楪榆縣東三危山在隴西三曲所處武都河池縣有泉街水烏水出烏校縣龍池山泥水出郁郅北蠻中姑臧南山谷水所出倉松縣南山松陝水所出猛陵縣龍山合水所出嬴𨻻縣南越侯織在此並後漢書注大夏縣有禹廟禹所出也京兆胡縣曹陽亭在宏農縣東十三里其水西北流入於河子推逃隱於介山西河有中陽縣舊縣也晉水出龍山一云水結絀山在縣西北濟自大伾入河與河水鬭南泆為滎澤河汶為滎濟水受焉故有濟隄為北濟也京有大索小索亭漢書京索之間也丹水縣有大行關丹谿為關之東谷途自此去不復由關矣朝歌本洙邑也詩云爰采唐矣沬之鄉矣殷王武丁始遷居之為殷都禹貢紂都在冀州大陸之野即此矣有糟邱酒池之事焉有新聲靡樂號邑朝歌樂陵國有新樂縣即此城矣肥鄉縣太康中立以隸廣平也鴻上關郡在谷之頭故因以上谷名焉安樂縣晉封劉禪為公國遼西人見遼水有浮棺欲破之語曰我孤竹君也汝破我何為因為立祠焉惠帝使校尉陳繼仲元詣洛陽山請雨總盡除小祀唯存大石而祈之七日大雨新興縣南安之屬縣也雍縣西虢地也西鄭友之始封嶢關在上洛縣西北天水始昌縣故城西也亦曰清崖峽西郡在洛上故以為名襄城楚靈王築翟本櫟也故潁川郡治也城西有郭奉孝碑水側有九山祠碑叢柏猶茂北枕川流賈逵祠在小城北漸欲平今不知所在矣淮陽城北有故沙名之為死沙犖北有谷水廩邱者春秋之所謂齊邑實大東海者也竹書紀年晉烈公十一年田悼子卒田布殺其大夫公孫公孫以廩邱叛於趙田布圍稟邱翟角趙孔屑韓師救廩邱及田布戰於龍賊田布敗遁是也孔子葬於魯城北泗水上今泗水南有夫子冢仲虺城在薛城西三十里義陽郡宜都郡雩婁在安豐縣之西南陶朱冢在華容縣樹碑云是越之范蠡安豐縣安豐郡之屬縣也俗名之曰安城矣入湯口四十二里有石煮以為鹽石大者如升小者如拳煮之水竭鹽成蓋蜀火井之倫水火相得乃佳矣湯谿下與檀谿水合上承巴渠水巴渠南歷檀井谿之檀井水下入湯水湯水南入於江名曰湯口西陽郡弦子國梁州南至桓水西底黑水東限扞關今漢中巴郡汶山蜀郡漢嘉江陽朱提涪陵陰平廣漢新都梓潼犍為武都上庸魏興新城皆古梁州之地魏興郡蜀置涪陵郡領縣五晉因之箋引晉地志牂柯治宛溫縣臨賀郡吳置統縣六曰臨賀謝沐馮乘封陽興安富川箋引晉地理志日南郡去盧容浦口二百里故秦象林郡象林縣治也永和五年征西桓溫遣督蔎滕畯率交廣兵伐范文於舊日南之盧容縣為文所敗即是處也九德郡有浦陽縣九德縣南陵縣九真郡有松原縣朱吾縣屬日郡去郡二百里高要縣東去郡五百里刺史夏避毒徙縣水居也縣有鵠奔亭泉陵縣有香茅氣甚芬香言貢之以縮酒也漢末博士燉煌侯瑾善內學語弟子曰涼州城西泉水當竭有雙關其上至魏嘉平中武威太守條茂起學舍築闕於此泉太守填水造起門樓與學闕相望泉源徙發重導於斯故有靈淵之名涼州有龍形故曰臥龍城南北七里東西三里本匈奴所築乃張氏之世居也又增築四城箱各千步東城植園果命曰講武場北城植園果命曰元武圃皆有宮殿中城內作四時宮隨節遊幸并舊城為五街衢相通二十二門大繕宮殿觀閤采綺妝節擬中夏也並水經注陽夏惠帝永康中復立漢中孝武太元十五年梁州刺史周表立武帝太康元年改上庸之廣昌為庸昌二年省晉壽邵孝武太元十五年梁州刺史周馥表立南漢中孝武太元十五年梁州刺史周瓊表立漢興屬興古郡並宋書荀晞曰淮陽之地阻塗山南枕靈嶽惠帝以燉煌地闊遠分立晉昌郡晉昌護匈奴中郎將別領戶並文選注汧陽縣屬秦國吳山在西雷首山一名滌山清河國凡領清河等六縣蘭池縣屬隴西郡宜春縣出美酒隨歲貢上並初學記舜以冀州南北廣大分燕北地為幽州幽州因幽都以為名長垣古衛故匡城地孔子所厄處也漢陽有大阪名隴坻亦曰隴山御處其西故曰隴西其山推旁崩聲聞數百里揚雄所謂響若坻頹是也並御覽陳城西南角有淮陽城漢淮陽縣國城也省斄以併郡蓋取斄之南境渭之南以併郡非省縣也蓮勺縣屬馮翊郁夷省併郿蓋因王莽之亂郁夷之人權寄理郁界因併於郿少山即大谷水衍出經初縣界樂平東南有夷儀道通襄國夷儀山在城北故塞改阜邑為阜城易縣漢故安縣屬范陽國軍都縣屬燕國太康中以雩都贛南埜等縣割為南康郡而廬陵百姓去管遙遠乃移郡於石陽縣潯陽南開六道途通五嶺北導長江遠行岷漢來商納賈亦一都會也漢明帝時歷陽淪為麻湖亦古歷陽城之城地在縣西三十里源出桑山並寰宇記孤竹在肥如南十二里秦之離支縣漢令支也大阾下有釣臺彼俗謂之臺陂並路史鄱陽樂安出黃金鑿土十餘丈披沙之中所得者大如豆小如粟米南海象林南有四國皆漢人貢金供稅並初學記
